<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="memory-indicator" id="memoryIndicator"></div>
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="btn mem" onclick="memClear()">MC</button>
            <button class="btn mem" onclick="memRecall()">MR</button>
            <button class="btn mem" onclick="memAdd()">M+</button>
            <button class="btn mem" onclick="memSubtract()">M-</button>

            <button class="btn mem" onclick="memStore()">MS</button>
            <button class="btn op" onclick="clearAll()">C</button>
            <button class="btn op" onclick="negate()">±</button>
            <button class="btn op" onclick="percent()">%</button>

            <button class="btn num" onclick="digit(7)">7</button>
            <button class="btn num" onclick="digit(8)">8</button>
            <button class="btn num" onclick="digit(9)">9</button>
            <button class="btn op" onclick="operator('/')">÷</button>

            <button class="btn num" onclick="digit(4)">4</button>
            <button class="btn num" onclick="digit(5)">5</button>
            <button class="btn num" onclick="digit(6)">6</button>
            <button class="btn op" onclick="operator('*')">×</button>

            <button class="btn num" onclick="digit(1)">1</button>
            <button class="btn num" onclick="digit(2)">2</button>
            <button class="btn num" onclick="digit(3)">3</button>
            <button class="btn op" onclick="operator('-')">−</button>

            <button class="btn num zero" onclick="digit(0)">0</button>
            <button class="btn num" onclick="decimal()">.</button>
            <button class="btn op" onclick="equals()">=</button>
            <button class="btn op" onclick="operator('+')">+</button>
        </div>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
